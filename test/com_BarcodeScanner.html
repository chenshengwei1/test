<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="preload" as="style" onload="this.rel='stylesheet';this.onload=null"
        href="https://fonts.googleapis.com/css?family=Roboto:300,300italic,700,700italic">
    <link rel="preload" as="style" onload="this.rel='stylesheet';this.onload=null"
        href="https://unpkg.com/normalize.css@8.0.0/normalize.css">
    <link rel="preload" as="style" onload="this.rel='stylesheet';this.onload=null"
        href="https://unpkg.com/milligram@1.3.0/dist/milligram.min.css">
</head>

<body>

    <main class="wrapper" style="text-align: center">


        <!-- 
            <div>
                <a class="button" id="startButton">Start</a>
                <a class="button" id="resetButton">Reset</a>
            </div> -->

        <div>
            <video id="video" width="100%" height="250" style="border: 1px solid gray"></video>
        </div>

        <div id="sourceSelectPanel" style="display:none">
            <label for="sourceSelect">Change camera:</label>
            <select id="sourceSelect" style="max-width:400px">
            </select>
        </div>

    </main>

    <script type="text/javascript" src="./zxing.js"></script>
    <script type="text/javascript">
        let codeReader;


        window.addEventListener('load', async function () {
            let selectedDeviceId;
            let hints = new Map();
            const formats = [ZXing.BarcodeFormat.QR_CODE, ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.CODABAR, ZXing.BarcodeFormat.DATA_MATRIX, ZXing.BarcodeFormat.CODE_39, ZXing.BarcodeFormat.CODE_93];
            hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);

            codeReader = new ZXing.BrowserMultiFormatReader(hints);
            console.log('ZXing code reader initialized');
            try {
                let videoInputDevices = await codeReader.listVideoInputDevices();

                const sourceSelect = document.getElementById('sourceSelect');
                selectedDeviceId = videoInputDevices[0].deviceId;

                if (videoInputDevices.length > 0) {
                    videoInputDevices.forEach((element) => {
                        const sourceOption = document.createElement('option');
                        sourceOption.text = element.label;
                        sourceOption.value = element.deviceId;
                        sourceSelect.appendChild(sourceOption);
                    })
                    sourceSelect.onchange = () => {
                        selectedDeviceId = sourceSelect.value;
                        this.startCamera(selectedDeviceId);
                    }
                    const sourceSelectPanel = document.getElementById('sourceSelectPanel');
                    sourceSelectPanel.style.display = 'block';

                    this.startCamera(selectedDeviceId);
                }

            } catch (err) {
                console.error(err);
            }
        })

        async function startCamera(cameraDeviceId) {
            try {
                let result = await codeReader.decodeOnceFromVideoDevice(cameraDeviceId, 'video');
                console.log('capture code is ' + result);
                codeReader.reset();

                if (window.parent) {
					let resultObj = {
						origin: 'zxing_barcode_scanner',
						result: result.text
					};
                    window.parent.postMessage(resultObj);
				}
            } catch (err) {
                console.error(err);
            }
        }
    </script>

</body>

</html>
